<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Email Provider Admin</title>
    <link rel="stylesheet" href="/static/admin/styles.css" />
  </head>
  <body>
    <div class="shell">
      <header class="hero">
        <div>
          <p class="eyebrow">Email Provider Control</p>
          <h1>邮箱服务管理台</h1>
          <p class="subhead">集中维护 provider 配置，做配置校验，并查看最近邮箱会话状态。</p>
        </div>
        <div class="auth-card">
          <label for="apiKeyInput">API Key</label>
          <input id="apiKeyInput" type="password" placeholder="输入 EMAIL_PROVIDER_API_KEY" />
          <div class="auth-actions">
            <button id="saveApiKeyBtn" class="primary">保存</button>
            <button id="clearApiKeyBtn" class="ghost">清除</button>
          </div>
          <p id="authStatus" class="hint">尚未保存 API Key</p>
        </div>
      </header>

      <main class="grid">
        <section class="panel list-panel">
          <div class="panel-head">
            <div>
              <p class="kicker">Provider Configs</p>
              <h2>保存的厂商配置</h2>
            </div>
            <button id="refreshConfigsBtn" class="ghost">刷新</button>
          </div>
          <div id="configList" class="config-list"></div>
        </section>

        <section class="panel editor-panel">
          <div class="panel-head">
            <div>
              <p class="kicker">Editor</p>
              <h2>配置编辑器</h2>
            </div>
            <div class="actions">
              <button id="newConfigBtn" class="ghost">新建</button>
              <button id="fillTemplateBtn" class="ghost">填充模板</button>
              <button id="saveConfigBtn" class="primary">保存配置</button>
            </div>
          </div>

          <div class="form-grid">
            <label>
              <span>ID</span>
              <input id="configIdInput" type="text" readonly />
            </label>
            <label>
              <span>配置名称</span>
              <input id="configNameInput" type="text" placeholder="例如 applemail-prod" />
            </label>
            <label>
              <span>Provider</span>
              <select id="providerSelect"></select>
            </label>
            <label class="checkbox">
              <input id="enabledCheckbox" type="checkbox" checked />
              <span>启用</span>
            </label>
            <label class="full">
              <span>代理</span>
              <input id="proxyInput" type="text" placeholder="可选，如 socks5h://user:pass@host:port" />
            </label>
            <label class="full">
              <span>说明</span>
              <input id="descriptionInput" type="text" placeholder="例如 ChatGPT 注册专用 AppleMail 池" />
            </label>
            <label class="full">
              <span>Extra JSON</span>
              <textarea id="extraJsonInput" rows="14" spellcheck="false"></textarea>
            </label>
          </div>

          <div class="editor-footer">
            <div class="actions">
              <button id="validateConfigBtn" class="secondary">校验配置</button>
              <button id="deleteConfigBtn" class="danger">删除配置</button>
            </div>
            <p id="formStatus" class="hint">选择左侧配置，或新建一个配置。</p>
          </div>
        </section>

        <section class="panel catalog-panel">
          <div class="panel-head">
            <div>
              <p class="kicker">Catalog</p>
              <h2>Provider 字段说明</h2>
            </div>
          </div>
          <div id="providerGuide" class="guide"></div>
        </section>

        <section class="panel sessions-panel">
          <div class="panel-head">
            <div>
              <p class="kicker">Sessions</p>
              <h2>最近邮箱会话</h2>
            </div>
            <button id="refreshSessionsBtn" class="ghost">刷新</button>
          </div>
          <div id="sessionList" class="session-list"></div>
        </section>
      </main>
    </div>

    <template id="configCardTemplate">
      <button class="config-card" type="button">
        <span class="config-name"></span>
        <span class="config-meta"></span>
      </button>
    </template>

    <script src="/static/admin/app.js"></script>
  </body>
  </html>
