services:
  email-provider:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: email-provider
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:8010:8010"
    volumes:
      - ./runtime:/runtime
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/healthz', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
